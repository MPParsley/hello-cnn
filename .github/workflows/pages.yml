name: Deploy to GitHub Pages

on:
  push:
    branches: ["claude/**", main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          npx --yes html-validate \
            --config='{"extends":["html-validate:recommended"],"rules":{"no-trailing-whitespace":"off","void-style":"off"}}' \
            index.html || true

      - name: Download and convert MNIST data
        run: |
          mkdir -p data
          pip3 install --quiet Pillow numpy
          curl -fL --retry 3 \
            "https://storage.googleapis.com/learnjs-data/model-builder/mnist_images.png" \
            -o /tmp/mnist_images.png
          curl -fL --retry 3 \
            "https://storage.googleapis.com/learnjs-data/model-builder/mnist_labels_uint8" \
            -o /tmp/mnist_labels_uint8
          python3 - <<'EOF'
import numpy as np
from PIL import Image

# Original layout: rows 0-54999 = training, rows 55000-64999 = test.
# We only need a subset for the demo — 10 000 train + 2 000 test = ~9.4 MB.
N_TRAIN, N_TEST = 10_000, 2_000

imgs = np.array(Image.open('/tmp/mnist_images.png').convert('L'), dtype=np.uint8)
train_imgs = imgs[:N_TRAIN]
test_imgs  = imgs[55_000 : 55_000 + N_TEST]
np.concatenate([train_imgs, test_imgs]).tofile('data/mnist_images.bin')

labels = np.frombuffer(open('/tmp/mnist_labels_uint8', 'rb').read(), dtype=np.uint8)
train_labels = labels[:N_TRAIN * 10]
test_labels  = labels[55_000 * 10 : (55_000 + N_TEST) * 10]
np.concatenate([train_labels, test_labels]).tofile('data/mnist_labels.bin')

print(f'images: {(N_TRAIN+N_TEST)*784:,} bytes  labels: {(N_TRAIN+N_TEST)*10:,} bytes')
EOF

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github'
