name: Deploy to GitHub Pages

on:
  push:
    branches: ["claude/**", main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Train CNN in Node.js ──────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Train CNN and save TF.js model
        run: node scripts/train_model.js

      # ── Prepare MNIST subsets for in-browser training option ─────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install --quiet Pillow numpy

      - name: Download and prepare MNIST subsets
        run: |
          curl -fL --retry 3 \
            "https://storage.googleapis.com/learnjs-data/model-builder/mnist_images.png" \
            -o /tmp/mnist_images.png
          curl -fL --retry 3 \
            "https://storage.googleapis.com/learnjs-data/model-builder/mnist_labels_uint8" \
            -o /tmp/mnist_labels_uint8
          python scripts/prepare_mnist.py

      # ── Deploy ────────────────────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
