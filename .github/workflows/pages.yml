name: Deploy to GitHub Pages

on:
  push:
    branches: ["claude/**", main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # TF 2.15 supports Python 3.9–3.11 and ships Keras 2.x whose
          # model.to_json() produces topology TF.js 4.x can load directly.
          python-version: '3.11'

      - name: Install Python dependencies
        # No tensorflowjs: it imports jax/jax2tf (breaking API changes) and
        # uses removed NumPy aliases (np.object). We export the TF.js
        # LayersModel format manually — just JSON + a float32 binary shard.
        run: pip install --quiet 'tensorflow-cpu==2.15.1' Pillow numpy

      - name: Train CNN and export to TF.js
        run: python scripts/train_model.py

      - name: Download and prepare MNIST subsets
        run: |
          curl -fL --retry 3 \
            "https://storage.googleapis.com/learnjs-data/model-builder/mnist_images.png" \
            -o /tmp/mnist_images.png
          curl -fL --retry 3 \
            "https://storage.googleapis.com/learnjs-data/model-builder/mnist_labels_uint8" \
            -o /tmp/mnist_labels_uint8
          python scripts/prepare_mnist.py

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github'
