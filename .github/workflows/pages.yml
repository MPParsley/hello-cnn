name: Deploy to GitHub Pages

on:
  push:
    branches: ["claude/**", main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Train CNN in Node.js ──────────────────────────────────────────────
      # @tensorflow/tfjs-node saves natively to TF.js LayersModel format so
      # there is no Python-to-TF.js converter and no fragile Python ML
      # dependency chain (tensorflow / jax / protobuf / numpy conflicts).
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Train CNN and save TF.js model
        run: node scripts/train_model.js

      # ── Prepare MNIST subsets for in-browser training option ─────────────
      # Only needs Pillow + numpy — no tensorflow, no version conflicts.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install --quiet Pillow numpy

      - name: Download and prepare MNIST subsets
        run: |
          curl -fL --retry 3 \
            "https://storage.googleapis.com/learnjs-data/model-builder/mnist_images.png" \
            -o /tmp/mnist_images.png
          curl -fL --retry 3 \
            "https://storage.googleapis.com/learnjs-data/model-builder/mnist_labels_uint8" \
            -o /tmp/mnist_labels_uint8
          python scripts/prepare_mnist.py

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,node_modules'
