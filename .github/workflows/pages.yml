name: Deploy to GitHub Pages

on:
  push:
    branches: ["claude/**", main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML
        run: |
          npx --yes html-validate \
            --config='{"extends":["html-validate:recommended"],"rules":{"no-trailing-whitespace":"off","void-style":"off"}}' \
            index.html || true

      - name: Download and convert MNIST data
        run: |
          mkdir -p data
          pip3 install --quiet Pillow numpy
          curl -fL --retry 3 \
            "https://storage.googleapis.com/learnjs-data/model-builder/mnist_images.png" \
            -o /tmp/mnist_images.png
          curl -fL --retry 3 \
            "https://storage.googleapis.com/learnjs-data/model-builder/mnist_labels_uint8" \
            -o data/mnist_labels_uint8
          python3 - <<'EOF'
import numpy as np
from PIL import Image
# Decode the PNG sprite sheet to raw grayscale uint8 bytes.
# Shape is (65000, 784) — one flattened 28x28 image per row.
arr = np.array(Image.open('/tmp/mnist_images.png').convert('L'), dtype=np.uint8)
arr.tofile('data/mnist_images.bin')
print(f'mnist_images.bin: {arr.shape} → {arr.size:,} bytes')
EOF

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github'
