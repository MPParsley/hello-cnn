name: Deploy to GitHub Pages

on:
  push:
    branches: ["claude/**", main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip3 install --quiet tensorflow tensorflowjs Pillow numpy

      - name: Train CNN and export to TF.js
        run: python3 scripts/train_model.py

      - name: Download and prepare MNIST subsets
        run: |
          curl -fL --retry 3 \
            "https://storage.googleapis.com/learnjs-data/model-builder/mnist_images.png" \
            -o /tmp/mnist_images.png
          curl -fL --retry 3 \
            "https://storage.googleapis.com/learnjs-data/model-builder/mnist_labels_uint8" \
            -o /tmp/mnist_labels_uint8
          python3 scripts/prepare_mnist.py

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github'
